<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deoband Bazar</title>

<style>
body{margin:0;font-family:Arial;background:#0f3d2e;color:white;scroll-behavior:smooth}
header{padding:15px;text-align:center;background:#0a2a20;position:sticky;top:0}
h1{margin:0}
.logo{font-size:28px;font-weight:bold}
.logo span{color:gold;font-size:32px;margin-right:5px}
.hero{text-align:center;padding:60px;background:linear-gradient(#0f3d2e,#000)}
.btn{padding:10px 20px;background:gold;color:black;border:none;border-radius:5px;cursor:pointer;transition:.3s}
.btn:hover{transform:scale(1.1);box-shadow:0 0 10px gold}
.section{padding:40px;text-align:center}
.cards{display:flex;flex-wrap:wrap;justify-content:center;gap:20px}
.card{background:white;color:black;padding:15px;border-radius:10px;width:220px;transition:.4s}
.card:hover{transform:scale(1.05)}
input{padding:10px;margin:5px;border-radius:5px;border:none;width:80%}
footer{padding:20px;text-align:center;background:#0a2a20}
.hidden{display:none}
</style>
</head>

<body>

<header>
<div class="logo"><span>د</span> Deoband Bazar</div>
<p>Since 2026</p>
</header>

<div class="hero">
<h2>Deoband ki original cheeze ab ghar tak</h2>
<p>Premium Quality • Prepaid Only</p>
<button class="btn" onclick="scrollToProducts()">Shop Now</button>
</div>

<div class="section" id="products">
<h2>Our Products</h2>
<div class="cards" id="productList"></div>
</div>

<div class="section hidden" id="checkout">
<h2>Checkout</h2>
<p id="productInfo"></p>
<p id="finalPrice"></p>
<input type="text" id="name" placeholder="Full Name"><br>
<input type="text" id="phone" placeholder="Phone Number"><br>
<input type="text" id="address" placeholder="Full Address"><br>
<input type="text" id="city" placeholder="City"><br>
<input type="text" id="state" placeholder="State"><br>
<input type="text" id="pincode" placeholder="Pincode"><br>
<button class="btn" onclick="payNow()">Pay Now</button>
</div>

<div class="section">
<h2>🎁 Reward Offer</h2>
<p>5 Orders Complete → Get 1 Surprise Gift</p>
</div>

<footer>
<p>© Deoband Bazar | WhatsApp Orders Available</p>
</footer>

<script>
const products=[
{name:"Ajwa Khajoor",price:500},
{name:"Safawi Khajoor",price:400},
{name:"Kalmi Khajoor",price:450},
{name:"Irani Khajoor",price:350},
{name:"Dry Fruit Mix",price:600},
{name:"Premium Kurta",price:800},
{name:"White Kurta",price:700},
{name:"Islamic Cap",price:150}
];

let currentProduct="";
let basePrice=0;
let finalAmount=0;
const deliveryCharge=80;
const upiId="8954141288-2@ibl";
const whatsapp="918954141288";

let orderCount=localStorage.getItem('orders') || 0;

function loadProducts(){
let container=document.getElementById('productList');
products.forEach(p=>{
let card=document.createElement('div');
card.className='card';
card.innerHTML=`<h3>${p.name}</h3><p>₹${p.price}</p><button class="btn" onclick="buy('${p.name}',${p.price})">Buy</button>`;
container.appendChild(card);
});
}

function scrollToProducts(){
document.getElementById('products').scrollIntoView({behavior:'smooth'});
}

function buy(name,price){
currentProduct=name;
basePrice=price;
finalAmount=price+deliveryCharge;
document.getElementById('checkout').classList.remove('hidden');
document.getElementById('productInfo').innerText=name+" - ₹"+price;
document.getElementById('finalPrice').innerText="Delivery: ₹"+deliveryCharge+" | Total: ₹"+finalAmount;
window.scrollTo(0,document.body.scrollHeight);
}

function payNow(){
let name=document.getElementById('name').value;
let phone=document.getElementById('phone').value;
let address=document.getElementById('address').value;
let city=document.getElementById('city').value;
let state=document.getElementById('state').value;
let pincode=document.getElementById('pincode').value;

if(!name||!phone||!address||!city||!state||!pincode){
alert('Please fill all details');
return;
}

if(pincode.length!==6 || isNaN(pincode)){
alert('Enter valid 6-digit pincode');
return;
}

let upiLink=`upi://pay?pa=${upiId}&pn=DeobandBazar&am=${finalAmount}`;
window.location.href=upiLink;

orderCount++;
localStorage.setItem('orders',orderCount);

setTimeout(()=>{
let rewardMsg = orderCount>=5 ? "%0A🎁 Eligible for FREE Gift" : "";
let message=`New Order:%0AProduct: ${currentProduct}%0ABase Price: ₹${basePrice}%0ADelivery: ₹${deliveryCharge}%0ATotal: ₹${finalAmount}%0AName: ${name}%0APhone: ${phone}%0AAddress: ${address}, ${city}, ${state} - ${pincode}${rewardMsg}%0APayment Done`;
window.open(`https://wa.me/${whatsapp}?text=${message}`,'_blank');
},3000);
}

loadProducts();
</script>

</body>
</html>
